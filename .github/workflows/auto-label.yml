name: Auto Label

on:
  pull_request:

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label pre-commit PR
        if: github.actor == 'pre-commit-ci[bot]'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: pre-commit
